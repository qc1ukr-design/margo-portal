name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ---- Next.js TypeScript check ----
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Check if package.json exists (Next.js initialized)
        id: check_pkg
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No root package.json — skipping TypeScript check (Next.js not yet initialized)"
          fi
      - if: steps.check_pkg.outputs.exists == 'true'
        run: npm ci
      - if: steps.check_pkg.outputs.exists == 'true'
        run: npx tsc --noEmit

  # ---- Crypto smoke test (no external deps) ----
  kms-crypto:
    name: KMS Crypto Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run AES-256-GCM smoke tests
        run: node tests/kms-crypto-smoke.cjs

  # ---- Security scan: no secrets in code ----
  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets (AWS keys, live tokens, JWTs)
        run: |
          ! grep -rn "AKIA[0-9A-Z]\{16\}" src/ railway/ --include="*.ts" --include="*.js"
          ! grep -rn "sk_live_[a-zA-Z0-9]\+" src/ railway/ --include="*.ts" --include="*.js"
          echo "Secret scan: no hardcoded AWS keys or live tokens found ✓"
      - name: Check Railway services have no hardcoded credentials
        run: |
          for svc in railway/kms-service railway/reconciliation-worker railway/signing-service; do
            if grep -rn "AWS_SECRET_ACCESS_KEY\s*=\s*['\"][^'\"]\+" "$svc/index.js" 2>/dev/null; then
              echo "FAIL: hardcoded secret found in $svc"
              exit 1
            fi
          done
          echo "Railway services credential check passed ✓"

  # ---- RLS migration syntax check ----
  migration-lint:
    name: Migration Files Exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all migration files are present
        run: |
          for f in \
            supabase/migrations/001_initial_schema.sql \
            supabase/migrations/002_add_currency_to_bank_transactions.sql \
            supabase/migrations/003_add_credential_sources.sql \
            supabase/migrations/004_add_marketplace_match_strategy.sql \
            supabase/migrations/005_rls_policies.sql; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

  # ---- Railway services: package.json sanity ----
  railway-services:
    name: Railway Service Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install kms-service deps
        working-directory: railway/kms-service
        run: npm install --ignore-scripts
      - name: Install reconciliation-worker deps
        working-directory: railway/reconciliation-worker
        run: npm install --ignore-scripts
      - name: Syntax check Railway services
        run: |
          node --check railway/kms-service/index.js
          node --check railway/reconciliation-worker/index.js
          node --check railway/signing-service/index.js
          echo "All Railway service syntax checks passed ✓"
